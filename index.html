<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum Vitrine</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: #2c1810;
            color: #f5e6c8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 20px;
            max-width: 800px;
            width: 100%;
        }
        h1 {
            font-size: 2.5em;
            color: #d4af37;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .btn {
            background: linear-gradient(to bottom, #d4af37, #a08520);
            color: #2c1810;
            border: none;
            padding: 15px 40px;
            font-size: 1.3em;
            font-family: 'Georgia', serif;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            min-width: 150px;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-depot {
            background: linear-gradient(to bottom, #8b4513, #5c2e0e);
            color: #f5e6c8;
        }
        #bild-container img {
            max-width: 90%;
            max-height: 50vh;
            border: 4px solid #d4af37;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .bildunterschrift {
            color: #f5e6c8;
            font-size: 1.3em;
            margin-top: 12px;
            font-style: italic;
            text-align: center;
            min-height: 1.5em;
        }
        .fortschritt {
            color: #d4af37;
            font-size: 1em;
            margin-bottom: 15px;
        }
        .ergebnis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .ergebnis-item img {
            width: 100%;
            border: 3px solid #d4af37;
            border-radius: 8px;
        }
        .ergebnis-item p {
            font-size: 0.9em;
            margin-top: 5px;
            color: #f5e6c8;
        }
        #start-screen, #spiel-screen, #ergebnis-screen {
            display: none;
        }
        #start-screen.active, #spiel-screen.active, #ergebnis-screen.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Startseite -->
        <div id="start-screen" class="active">
            <h1>🏛️ Museum Vitrine</h1>
            <p style="font-size:1.2em; margin-bottom:30px;">Wähle aus, welche Objekte in die Vitrine kommen!</p>
            <button class="btn" onclick="startSpiel()">Los</button>
        </div>

        <!-- Spielbildschirm -->
        <div id="spiel-screen">
            <p class="fortschritt" id="fortschritt"></p>
            <div id="bild-container">
                <img id="aktuelles-bild" src="" alt="Museumsobjekt">
            </div>
            <p class="bildunterschrift" id="bildunterschrift"></p>
            <div style="margin-top: 20px;">
                <button class="btn btn-depot" onclick="waehlen('depot')">Depot</button>
                <button class="btn" onclick="waehlen('vitrine')">Vitrine</button>
            </div>
        </div>

        <!-- Ergebnis -->
        <div id="ergebnis-screen">
            <h1>Deine Vitrine</h1>
            <div class="ergebnis-grid" id="ergebnis-grid"></div>
            <br>
            <button class="btn" onclick="neuStart()">Neu starten</button>
        </div>
    </div>

    <script>
        const bilder = [
            'bilder/bild1.jpg',
            'bilder/bild2.jpg',
            'bilder/bild3.jpg',
            'bilder/bild4.jpg',
            'bilder/bild5.jpg',
            'bilder/bild6.jpg',
            'bilder/bild7.jpg',
            'bilder/bild8.jpg',
            'bilder/bild9.jpg',
            'bilder/bild10.jpg',
            'bilder/bild11.jpg',
            'bilder/bild12.jpg'
        ];

        const bildunterschriften = [
            'Kaffeekanne aus Zinn',
            'Tintenfass',
            'Federhalter',
            'Apfelentkerner',
            'Kaffeemühle',
            'Bettflasche',
            'Tabakdose',
            'Rechenschieber',
            'Dolchschneide',
            'Backeisen für Kringelplätzchen',
            'Doppelseilrolle mit Führung',
            'Tabakschneidemaschine'
        ];

        let aktuellesIndex = 0;
        let vitrineAuswahl = [];

        function startSpiel() {
            aktuellesIndex = 0;
            vitrineAuswahl = [];
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('spiel-screen').classList.add('active');
            zeigeBild();
        }

        function zeigeBild() {
            document.getElementById('aktuelles-bild').src = bilder[aktuellesIndex];
            document.getElementById('bildunterschrift').textContent = bildunterschriften[aktuellesIndex];
            document.getElementById('fortschritt').textContent = (aktuellesIndex + 1) + ' / ' + bilder.length;
        }

        function waehlen(wahl) {
            if (wahl === 'vitrine') {
                vitrineAuswahl.push({
                    bild: bilder[aktuellesIndex],
                    name: bildunterschriften[aktuellesIndex]
                });
            }
            aktuellesIndex++;
            if (aktuellesIndex < bilder.length) {
                zeigeBild();
            } else {
                zeigeErgebnis();
            }
        }

        function zeigeErgebnis() {
            document.getElementById('spiel-screen').classList.remove('active');
            document.getElementById('ergebnis-screen').classList.add('active');
            const grid = document.getElementById('ergebnis-grid');
            grid.innerHTML = '';
            if (vitrineAuswahl.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1;">Du hast keine Objekte für die Vitrine gewählt.</p>';
                return;
            }
            vitrineAuswahl.forEach(item => {
                const div = document.createElement('div');
                div.className = 'ergebnis-item';
                div.innerHTML = '<img src="' + item.bild + '" alt="' + item.name + '"><p>' + item.name + '</p>';
                grid.appendChild(div);
            });
        }

        function neuStart() {
            document.getElementById('ergebnis-screen').classList.remove('active');
            document.getElementById('start-screen').classList.add('active');
        }

        // Service Worker registrieren
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
